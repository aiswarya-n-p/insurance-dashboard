<!DOCTYPE html>
<html>

<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6fb;
font-family:Arial;
}

.navbar{
background:#5b4bd1;
}

.navbar-brand{
color:white !important;
font-weight:bold;
}

.nav-link{
color:white !important;
}

.header{
margin-top:20px;
margin-bottom:25px;
}

.kpi-card{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.kpi-number{
font-size:26px;
font-weight:bold;
color:#5b4bd1;
}

.card{
border:none;
border-radius:12px;
}

.card:hover{
transform:scale(1.02);
transition:0.2s;
}

.progress{
height:12px;
}

</head>

<nav class="navbar navbar-expand-lg">

<div class="container">

<div>

<a class="nav-link">Home</a>
</li>

<li class="nav-item">

</li>

<li class="nav-item">
<a class="nav-link">Customer Services</a>
</li>

</ul>

</div>

</div>

</nav>

<div class="container">

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
